version: "3.8"

services:
  frontend:
    build: ./tenderflow-pro
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
    build: ./backend-tenderflow
    ports:
      - "3000:3000"
    env_file: 
      - ./backend-tenderflow/.env
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis
    ports:
      - "6379:6379"

volumes:
  mongo_data: